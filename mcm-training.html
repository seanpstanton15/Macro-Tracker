// Determine current week based on today's date
function getCurrentWeek() {
  const today = new Date();
  const starts = [
    new Date(2026,4,18), new Date(2026,4,25), new Date(2026,5,1),  new Date(2026,5,8),
    new Date(2026,5,15), new Date(2026,5,22), new Date(2026,5,29), new Date(2026,6,6),
    new Date(2026,6,13), new Date(2026,6,20), new Date(2026,6,27), new Date(2026,7,3),
    new Date(2026,7,10), new Date(2026,7,17), new Date(2026,7,24), new Date(2026,7,31),
    new Date(2026,8,7),  new Date(2026,8,14), new Date(2026,8,21), new Date(2026,8,28),
    new Date(2026,9,5),  new Date(2026,9,12), new Date(2026,9,19),
  ];
  for (let i = starts.length - 1; i >= 0; i--) {
    if (today >= starts[i]) return i + 1;
  }
  return 1;
}

function s(tag, props, ...children) {
  return React.createElement(tag, props, ...children);
}

  const chartRef = useRef(null);
  const chartInst = useRef(null);

  const pw = WEEKS.filter(w => w.p === sp);
  const cw = WEEKS.find(w => w.w === sw) || pw[0];
  const pc = PC[sp];
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;

  const bgP  = isDark ? '#292524' : 'var(--bg-primary)';
  const bgS  = isDark ? '#44403c' : '#f5f5f4';
  const txP  = isDark ? '#fafaf9' : '#1c1917';
  const txS  = isDark ? '#a8a29e' : '#78716c';
  const bdr  = isDark ? '#57534e' : '#e7e5e4';

  useEffect(() => {
    if (!chartRef.current) return;
    if (chartInst.current) chartInst.current.destroy();
    const labels = WEEKS.map(w => `W${w.w}`);
    const data = WEEKS.map(w => w.mi);
    const bgs = WEEKS.map(w => {
      const c = PC[w.p];
      return w.w === sw ? c.bd : (isDark ? c.bd + '55' : c.bg);
    });
    chartInst.current = new Chart(chartRef.current, {
      type: 'bar',
      data: {labels, datasets: [{data, backgroundColor: bgs, borderWidth: 0, borderRadius: 3}]},
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {legend: {display: false}, tooltip: {callbacks: {label: ctx => `${ctx.raw} mi`}}},
        scales: {
          x: {grid: {display: false}, ticks: {font: {size: 9}, color: txS, maxRotation: 0, autoSkip: true, maxTicksLimit: 12}},
          y: {display: false, max: 70},
        },
        onClick: (e, els) => {
          if (els.length) {
            const wk = WEEKS[els[0].index];
            setSp(wk.p); setSw(wk.w);
          }
        },
      }
    });
  }, [sw, sp]);

  const card = (children, extra = {}) =>
    s('div', {style: {background: bgS, borderRadius: 8, padding: '8px 10px', ...extra}}, children);

  return s('div', {style: {fontFamily: 'var(--font)'}},

    // Header
    s('div', {style: {marginBottom: 20}},
      s('div', {style: {fontSize: 11, color: txS, marginBottom: 3, letterSpacing: '0.06em', textTransform: 'uppercase'}},
        'Marine Corps Marathon · Oct 25, 2026 · 23 weeks'),
      s('div', {style: {fontSize: 22, fontWeight: 600, color: txP, marginBottom: 4}}, 'Sub-3:15 Training Plan'),
      s('div', {style: {fontSize: 12, color: txS}},
        'Calibrated to Cherry Blossom 10 mi (6:45 @ 168 HR) · Goal pace 7:27/mi · Peaks at 65 miles/week')
    ),

    // Fitness stats
    s('div', {style: {display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 8, marginBottom: 20}},
      FITNESS.map((f, i) => card(
        [s('div', {key:'lb', style:{fontSize:10,color:txS,marginBottom:2}}, f.lb),
         s('div', {key:'val', style:{fontSize:15,fontWeight:500,color:txP}}, f.val)],
        {key: i}
      ))
    ),

    // Mileage chart
    s('div', {style: {position: 'relative', width: '100%', height: 90, marginBottom: 20}},
      s('canvas', {ref: chartRef, 'aria-label': 'Weekly mileage chart. Click a bar to navigate.'})
    ),

    // Phase selector
    s('div', {style: {display: 'flex', gap: 6, marginBottom: 10, flexWrap: 'wrap'}},
      [1,2,3,4,5].map(p => {
        const c = PC[p]; const isA = sp === p;
        return s('button', {
          key: p,
          onClick: () => { setSp(p); setSw(WEEKS.find(w => w.p === p).w); },
          style: {padding: '5px 12px', borderRadius: 8,
            border: isA ? `2px solid ${c.bd}` : `1px solid ${bdr}`,
            background: isA ? c.bg : 'transparent',
            color: isA ? c.tx : txS, fontSize: 12, fontWeight: isA ? 600 : 400}
        },
          c.name,
          s('span', {style: {marginLeft: 5, fontSize: 10, opacity: 0.7}}, PWR[p])
        );
      })
    ),

    // Phase description
    s('div', {style: {padding: '8px 12px', borderRadius: 8, background: pc.bg,
      border: `1px solid ${pc.bd}`, fontSize: 12, color: pc.tx, marginBottom: 14}},
      PD[sp - 1]
    ),

    // Week selector
    s('div', {style: {display: 'flex', gap: 5, marginBottom: 14, flexWrap: 'wrap'}},
      pw.map(w => {
        const isA = w.w === sw; const isCur = w.w === initWeek;
        return s('button', {
          key: w.w, onClick: () => setSw(w.w),
          style: {padding: '4px 11px', borderRadius: 8,
            border: isA ? `2px solid ${pc.bd}` : isCur ? `1.5px dashed ${pc.bd}` : `1px solid ${bdr}`,
            background: isA ? pc.bg : 'transparent',
            color: isA ? pc.tx : txS, fontSize: 12, fontWeight: isA ? 600 : 400}
        },
          `Wk ${w.w}`,
          w.rec ? s('span', {style: {marginLeft: 3, fontSize: 9}}, '↓') : null,
          isCur && !isA ? s('span', {style: {marginLeft: 3, fontSize: 9, color: pc.bd}}, '•') : null
        );
      })
    ),

    // Week detail
    cw && s('div', {style: {background: bgP, border: `1px solid ${bdr}`, borderRadius: 12,
      padding: '14px 16px', marginBottom: 24}},
      s('div', {style: {display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12}},
        s('div', {style: {display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap'}},
          s('span', {style: {fontWeight: 600, fontSize: 15}}, `Week ${cw.w}`),
          s('span', {style: {fontSize: 12, color: txS}}, cw.dates),
          cw.rec && s('span', {style: {fontSize: 10, padding: '2px 7px', background: '#E1F5EE', color: '#0F6E56', borderRadius: 6}}, 'Recovery week'),
          cw.w === 14 && s('span', {style: {fontSize: 10, padding: '2px 7px', background: '#FAEEDA', color: '#854F0B', borderRadius: 6}}, 'Peak week'),
          cw.w === 23 && s('span', {style: {fontSize: 10, padding: '2px 7px', background: '#FCEBEB', color: '#A32D2D', borderRadius: 6}}, 'Race week'),
          cw.w === initWeek && s('span', {style: {fontSize: 10, padding: '2px 7px', background: pc.bg, color: pc.tx, borderRadius: 6}}, 'Current week')
        ),
        s('span', {style: {fontSize: 13, color: txS, fontWeight: 500}}, `~${cw.mi} mi`)
      ),
      s('div', {style: {display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 6}},
        cw.days.map((d, i) => {
          const ts = TS[d.t];
          const isRace = d.t === 'race';
          const isDone = cw.w === 1 && i === 0;
          return s('div', {key: i, style: {
            borderRadius: 8,
            border: isRace ? '2px solid #A32D2D' : isDone ? '2px solid #1D9E75' : `1px solid ${bdr}`,
            padding: '8px 7px',
            background: isRace ? '#FCEBEB' : isDone ? '#E1F5EE' : bgS,
          }},
            s('div', {style: {display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 5}},
              s('span', {style: {fontSize: 10, fontWeight: 600, color: txS}}, d.d),
              s('span', {style: {fontSize: 9, padding: '1px 5px', background: ts.bg, color: ts.co, borderRadius: 5}}, ts.lb)
            ),
            s('div', {style: {fontSize: 11, fontWeight: 500, color: isRace ? '#A32D2D' : isDone ? '#0F6E56' : txP, lineHeight: 1.35, marginBottom: 5}}, d.x),
            s('div', {style: {fontSize: 10, color: txS, lineHeight: 1.3}}, d.pa)
          );
        })
      )
    ),

    // Pace guide
    s('div', {style: {fontSize: 13, fontWeight: 600, color: txP, marginBottom: 8}}, 'Target paces — sub-3:15'),
    s('div', {style: {display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px,1fr))', gap: 8, marginBottom: 24}},
      PACES.map((p, i) => {
        const ts = TS[p.t];
        return card(
          [s('div', {key:'lb', style:{fontSize:10,color:txS,marginBottom:3}}, p.lb),
           s('div', {key:'pa', style:{fontSize:13,fontWeight:600,color:ts.co,marginBottom:3}}, p.pa),
           s('div', {key:'ds', style:{fontSize:10,color:txS}}, p.ds)],
          {key: i}
        );
      })
    ),

    // Key workouts
    s('div', {style: {fontSize: 13, fontWeight: 600, color: txP, marginBottom: 8}}, 'The 3 workouts that will make or break sub-3:15'),
    s('div', {style: {display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px,1fr))', gap: 8}},
      KEY_WORKOUTS.map((k, i) =>
        s('div', {key: i, style: {background: k.bg, border: `1px solid ${k.co}`, borderRadius: 8, padding: '10px 12px',
          cursor: 'pointer'},
          onClick: () => {
            const wkNum = parseInt(k.wk.match(/\d+/)[0]);
            const wk = WEEKS.find(w => w.w === wkNum);
            if (wk) { setSp(wk.p); setSw(wk.w); }
          }
        },
          s('div', {style: {fontSize: 10, color: k.co, marginBottom: 3}}, k.wk),
          s('div', {style: {fontSize: 13, fontWeight: 600, color: k.co, marginBottom: 4}}, k.nm),
          s('div', {style: {fontSize: 11, color: k.co}}, k.ds)
        )
      )
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
